# FOR DEVELOPMENT ONLY - Use docker-compose.prod.yml for production
# This configuration includes hardcoded secrets and relaxed security settings
# suitable only for local development environments.

services:
  # Database
  postgres:
    image: postgres:17-alpine
    container_name: ecom-postgres
    environment:
      POSTGRES_DB: ecom_db
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecom-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ecom_user -d ecom_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and BullMQ
  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - ecom-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS API
  api:
    build:
      context: .
      target: build
    container_name: ecom-api
    ports:
      - '3000:3000'
    environment:
      # Database
      DATABASE_URL: postgresql://ecom_user:ecom_password@postgres:5432/ecom_db?schema=public

      # App Configuration
      APP_NAME: 'docongnghe Docker'
      NODE_ENV: development
      PORT: 3000

      # JWT Configuration - CHANGE IN PRODUCTION!
      ACCESS_TOKEN_SECRET: docker_access_token_secret_change_in_prod_32chars
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_SECRET: docker_refresh_token_secret_change_in_prod_32chars
      REFRESH_TOKEN_EXPIRES_IN: 7d
      SECRET_API_KEY: docker_secret_api_key_change_in_production

      # Admin Default User - CHANGE IN PRODUCTION!
      ADMIN_NAME: Admin
      ADMIN_PASSWORD: admin_password_change_in_production
      ADMIN_EMAIL: admin@example.com
      ADMIN_PHONENUMBER: '0909090909'

      # OTP Configuration
      OTP_EXPIRES_IN: 5m
      RESEND_API_KEY: re_your_resend_api_key_here

      # Google OAuth - Configure with your credentials
      GOOGLE_CLIENT_ID: your_google_client_id.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: your_google_client_secret
      GOOGLE_REDIRECT_URI: http://localhost:3000/auth/google/callback
      GOOGLE_CLIENT_REDIRECT_URI: http://localhost:3300/oauth-google-callback

      # Media Prefix
      PREFIX_STATIC_ENDPOINT: http://localhost:3000/media/static

      # AWS S3 Configuration - Configure with your credentials
      S3_REGION: ap-southeast-1
      S3_ACCESS_KEY_ID: your_aws_access_key_id
      S3_SECRET_ACCESS_KEY: your_aws_secret_access_key
      S3_BUCKET_NAME: your-bucket-name

      # Redis Configuration - Points to Redis container
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USERNAME: default
      REDIS_PASSWORD: ''
      REDIS_URL: redis://redis:6379

      # CORS Configuration
      ALLOWED_ORIGINS: http://localhost:3300,http://localhost:5173

      # AI Service (Optional)
      ANTHROPIC_API_KEY: your_anthropic_api_key

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network
    volumes:
      - ./uploads:/app/uploads
      - ./prisma:/app/prisma

volumes:
  postgres_data:
  redis_data:

networks:
  ecom-network:
    driver: bridge
