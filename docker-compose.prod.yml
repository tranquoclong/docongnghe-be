# Production Docker Compose Configuration
# This file uses environment variables for all secrets and configurations.
# Copy .env.example to .env and fill in production values before deploying.
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#
# Environment variables are loaded from .env file or system environment.

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: ecom-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecom_db}
      POSTGRES_USER: ${POSTGRES_USER:-ecom_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecom-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ecom_user} -d ${POSTGRES_DB:-ecom_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Redis Cache and Queue
  redis:
    image: redis:7-alpine
    container_name: ecom-redis-prod
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory-policy noeviction
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - ecom-network
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # NestJS API Application
  api:
    image: ${API_IMAGE:-ghcr.io/docongnghe/nestjs_ecommerce_api:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ecom-api-prod
    ports:
      - '${PORT:-3000}:3000'
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://${POSTGRES_USER:-ecom_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-ecom_db}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-ecom_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ecom_db}

      # Application Configuration
      APP_NAME: ${APP_NAME:-NestJS Ecommerce Platform}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      API_URL: ${API_URL:?API_URL is required}

      # JWT Configuration
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:?ACCESS_TOKEN_SECRET is required (min 32 chars)}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required (min 32 chars)}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      SECRET_API_KEY: ${SECRET_API_KEY:?SECRET_API_KEY is required (min 32 chars)}

      # Admin Credentials
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PHONENUMBER: ${ADMIN_PHONENUMBER:-0000000000}

      # OTP Configuration
      OTP_EXPIRES_IN: ${OTP_EXPIRES_IN:-5m}

      # Email Service (Resend)
      RESEND_API_KEY: ${RESEND_API_KEY}

      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GOOGLE_CLIENT_REDIRECT_URI: ${GOOGLE_CLIENT_REDIRECT_URI}

      # Static Files
      PREFIX_STATIC_ENDPOINT: ${PREFIX_STATIC_ENDPOINT:-http://localhost:3000/media/static}

      # AWS S3 Configuration
      S3_REGION: ${S3_REGION:-ap-southeast-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}

      # VNData Cloud Storage (Optional)
      VNDATA_REGION: ${VNDATA_REGION:-hcm}
      VNDATA_ACCESS_KEY_ID: ${VNDATA_ACCESS_KEY_ID}
      VNDATA_SECRET_ACCESS_KEY: ${VNDATA_SECRET_ACCESS_KEY}
      VNDATA_CLOUD_STORAGE: ${VNDATA_CLOUD_STORAGE}
      VNDATA_S3_ENDPOINT: ${VNDATA_S3_ENDPOINT:-https://s3-hcm-r2.s3cloud.vn}

      # Redis Configuration (with authentication)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ${REDIS_USERNAME:-default}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

      # CORS Configuration
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}

      # AI Service (Optional)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Payment API
      PAYMENT_API_KEY: ${PAYMENT_API_KEY}

      # MUX Video Configuration (Optional)
      MUX_TOKEN_ID: ${MUX_TOKEN_ID}
      MUX_TOKEN_SECRET: ${MUX_TOKEN_SECRET}
      MUX_WEBHOOK_ENDPOINT: ${MUX_WEBHOOK_ENDPOINT}
      MUX_SIGNING_SECRET: ${MUX_SIGNING_SECRET}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network
    volumes:
      - ./uploads:/app/uploads
      - ./prisma:/app/prisma
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  postgres_data:
    driver: local
    labels:
      com.ecommerce.description: 'PostgreSQL data volume for production'
      com.ecommerce.backup: 'daily'
  redis_data:
    driver: local
    labels:
      com.ecommerce.description: 'Redis data volume for production'
      com.ecommerce.backup: 'optional'

networks:
  ecom-network:
    driver: bridge
    labels:
      com.ecommerce.description: 'Internal network for ecommerce services'
